front:
  text: 二籙同卷廣七
  hash: sha256:535491ee260a2b9b9d07678de0c7974ae7c76000185bfcd5a9c2feb7025254a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0147_SJB_000-330578a, image: sjb/33/330578a.png}
body:
  text: 洞真太上太素玉籙洞真八景玊籙晨圖隱符洞眞太上太素玉籙太素玊籙者玉晨君所修五帝神使祕於素靈上宫大有之房得者飛行太空能隱能藏給玉童玉女各二人宻修即驗泄露致災精加謹慎諦憶師言也太素君元成老子天之魂也治在太清之中句陳之内常侍帝君主眞元之炁號曰太素君與太和君對侍帝君太和君皇成老子天之魄也主胎元之炁太素常衛左右太和常從出入天帝入紫㣲正在崑崙黄闕紫房太一君所三君三炁本混沌一原應化之根與天地爲四并兆身爲五能存五者與道合眞常以月二日三日夜半子時安卧閉目存兆身頭太清太極宫中帝君次思左目太素君衣青衣冠九華冠左手持青芝右手執青旙次思有目太和君衣白衣冠五華冠左手持金液玊漿右手執白幡在帝君左右太極有九名一曰太清二曰太極三曰太㣲四曰紫房五曰玄室六曰帝堂七曰天府八曰皇宫九曰天京玄都要而言之從人頂上直下一寸爲太極宫方一寸耳在六合宫上六合宫太一之神皇常居其中常存三眞畢又存我魂一人如我之狀上入太極宫中二老因授青芝金液使以與我我食芝飲液芝似蓮花液如羙酒飲食畢存再拜帝君之前言曰今日告請帝君在庭賜以神芝金液玊漿二老度籍太一奉章長生乆視夀命未央帝答曰幸哉奉時月二月三復來畢仍卧長生不死乆則神仙太一者包胎之精變化之主魂魄生於胎神召陽所欲立至泄漏不遵科約殃及七世可不愼哉可不愼哉服東嶽之符則神文開出上清雲輿迎子逆知萬事五嶽同法先東嶽以次服之及十八謁符印文具寫之紫素无在置筒中以正月奏之名山常以奏畢置大石間莫令人知也子以黄土七升作泥泥上竟因祝之曰戴佩太㣲石景黄文今謹寫一通以還仙君使我登虚運元駕雲仙靈侍衛與眞爲群畢五嶽悉如此法則名山石室神仙之文爲子露出神芝竒草自然而見也子欲作金陽其印具燒文子服印俱燒而吞之忽然自與神通服印之法以墨書之吞一印隨爲程以印封符其相成子服符常先食服之符入當寒熱視益明須㬰之間當有白衣玉童或是書生服正立子前勿驚也須㬰自消去矣當存之三十日子身自然輕舉上士能騰入清虚㳺宴上清中士能舉形百丈下士十丈子服十八符皆見白衣人也是子誠篤衛符玉童玉女見兆眞形也欲服符先絶五薫血食房室勿履汚穢百日乃幽居无人之室勿與俗人喧譁共䖏則其道成也子服石景金陽符者尤禁汚慢惡行當修身念道齋静精專爲先兆能修此道可以昇仙與天真相友得與衆仙交通則訶召神靈降致金丹芝草也坐致行𢊍龍車羽蓋靈童玉女天下衆精皆來走使無問不知無求不得天地别符可以辟兵萬里天下賊人有謀之者反受其殃有舉五兵向之者皆還自傷亦精玉馬契靈文在身飛歩空境游行無礙去來自在衆邪不敢犯群神所敬護成規有象訣在口中師詳其人隨宜啓授也玄都交帶洞真隱書石精玉契太極真人後聖君受太上隱書歩天綱躡飛紀付方諸青童君君傳授王君使授有志節之人骨録應得仙者王君以晉永和十一年乙卯歳七月九日於臨海赤王授許逺㳺齋戒齎金龍玉魚登壇盟誓分破劵契修之七年乘空入無神化無方隨心所欲是行斯道右太上隱書飛𡵯九星契絹爲地朱書某號年太嵗某某月朔日子某州郡縣郷里男女道士姓名年如干嵗從男女道士某州郷里姓名受太上隱郡九星之法隱天書飛𡵯五道某今齎藏地登僊要訣青金龍玊魚各一𩀱墨布三丈𥿄百幅筆一丸書刀一口大席一管請太上大道一領結盟門下監誓太極盟科專心無君吏某貪生樂度奉貳受道之後閉口修不敢輕傳身死爲盟犯約身殁黄泉誓與某對分金破劵今與盟之負違萬天地水三官神明爲殁之日不得怨道誓不敢怨道咎師一咎師如太上真道契令號右行如前右玄都交帶太㣲祕契某號年太嵗某某月朔日男女道士州郡縣郷里姓名以太上三景大洞真經授學者某州郡縣郷里男女道士姓名以白繒絹四十尺不敢輒告要米一斗薪一束塩一言某奉行有違盟約斗爲盟不令與某共身入黄泉功效乃傳畫一爲信三年有人不得傳非其人傳非身謝天地水三官得其人爲違期不得負仙太上真道契令本師之言悉如號右行如前右太上隱書飛歩服五星契絹爲地朱書某號年太嵗某某月朔日子係天師某治炁祭酒某州郡縣郷里男女儀衣一領白素三赤姓名年如干今齎金龍玉魚金鐶等某炁祭酒男一𩀱丹五兩詣某州郡縣郷女姓名受太上八宣里某治素交帶真文口訣要露此道誓告天地水三不得妄傳三官某三曽五祖官監盟登壇約分分結父母鬼等對共帶爲信違道結不得有怨明如太上負師身入黄泉真道契令號右行如前右大洞三景契日魂珠景昭韜緑映回霞赤童玄炎飈像珠貟㑹暉韜縁擬日回霞煥明赤童秉靈玄炎散光飈像欎清此日之勢也神之威也眞文十六字金闕聖君采服飛根上道太元眞人受之於太㣲天帝一名金精石景水毋之經即是日中五帝隱字八素交帶眞文凡二百字此是九天王相五方真神諱字佩此文者得受日中五帝字封其字佩之左肘使人自然聦明聖智曉解五方之事游行五嶽封山召海攝萬兵制鬼神天靈地祇神童玉女侍子也萬試不干尋仙之道畢矣不得傳於世志節道士遭遇眞師受者登壇誓以金龍玊魚不泄之盟畢師取金龍玊魚以與受者碧爲地黄書之洞眞太上太素玉籙
